# =====================================================
# HiveX Backend - Configuracao via variaveis de ambiente
# Local: copie o .env.example para .env.ps1 e preencha
# Deploy: configure as variaveis no painel da plataforma
# =====================================================

# PostgreSQL
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# Alpha Vantage
alphavantage.api.key=${ALPHAVANTAGE_KEY:demo}

# CORS - permite front-end em qualquer origem
spring.web.cors.allowed-origins=*

# Porta (Railway usa a variavel PORT automaticamente)
server.port=${PORT:8080}
